<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - التكامل الوطنية للزراعة نظام تقييم الأصناف</title>
  <style>
    :root {
      --bg: #f3f6fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --border: #dbe3ea;
      --ok-bg: #ecfdf5;
      --ok-text: #065f46;
      --ok-border: #a7f3d0;
      --err-bg: #fef2f2;
      --err-text: #991b1b;
      --err-border: #fecaca;
      --warn-bg: #fff7ed;
      --warn-text: #9a3412;
      --warn-border: #fdba74;
      --shadow: 0 10px 28px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbfd 0%, #edf3f7 100%);
      color: var(--text);
    }

    .container {
      width: min(960px, calc(100% - 24px));
      margin: 24px auto 40px;
    }

    .header {
      background: linear-gradient(135deg, #0f766e, #134e4a);
      color: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3vw, 38px);
    }

    .header p {
      margin: 0;
      color: rgba(255,255,255,0.92);
      line-height: 1.9;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .auth-wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      margin-top: 6px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(15,118,110,0.1);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #eef7f6;
      color: var(--primary-dark);
      border: 1px solid #cfe7e4;
    }

    .btn-danger {
      background: #fff5f5;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.8;
      font-size: 14px;
      border: 1px solid transparent;
      margin-top: 14px;
      white-space: pre-wrap;
    }

    .alert.ok {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: var(--ok-border);
    }

    .alert.err {
      background: var(--err-bg);
      color: var(--err-text);
      border-color: var(--err-border);
    }

    .alert.warn {
      background: var(--warn-bg);
      color: var(--warn-text);
      border-color: var(--warn-border);
    }

    .debug {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px dashed var(--border);
      font-size: 13px;
      color: #334155;
      line-height: 1.8;
      white-space: pre-wrap;
      min-height: 72px;
    }

    .hidden { display: none !important; }

    .dashboard {
      display: grid;
      gap: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      background: #eef7f6;
      color: var(--primary-dark);
      border: 1px solid #cfe7e4;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .info-box {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .info-box span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .info-box strong {
      font-size: 18px;
      word-break: break-word;
    }

    @media (max-width: 700px) {
      .container {
        width: min(100% - 16px, 960px);
      }

      .header,
      .card {
        padding: 14px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>نظام تقييم أصناف بذور التجارب</h1>
      <p>تسجيل دخول مباشر مع فحص واضح لمشكلة Auth وجدول profiles.</p>
    </div>

    <div id="authSection" class="card auth-wrap">
      <div class="title-row">
        <h2>تسجيل الدخول</h2>
      </div>

      <div class="hint">أدخل الإيميل وكلمة المرور المسجلة في Supabase.</div>

      <div class="form-grid">
        <div class="field">
          <label>الإيميل</label>
          <input id="loginEmail" type="email" />
        </div>

        <div class="field">
          <label>كلمة المرور</label>
          <input id="loginPassword" type="password" />
        </div>
      </div>

      <div class="actions">
        <button id="loginBtn" class="btn-primary">دخول</button>
      </div>

      <div id="authMessage"></div>
      <div id="debugBox" class="debug"></div>
    </div>

    <div id="appSection" class="card dashboard hidden">

      <div class="topbar">
        <div>
          <h2>تم تسجيل الدخول</h2>
        </div>

        <div class="actions">
          <div id="userPill" class="pill">-</div>

          <!-- 🔥 زر الادمن -->
          <button id="adminBtn" class="btn-primary hidden">➕ إضافة موظف</button>

          <button id="logoutBtn" class="btn-danger">تسجيل الخروج</button>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <span>الإيميل</span>
          <strong id="userEmail"></strong>
        </div>

        <div class="info-box">
          <span>الدور</span>
          <strong id="userRole"></strong>
        </div>
      </div>

    </div>
  </div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://epqgayhsmnqbfdliqhil.supabase.co',
  'sb_publishable_0TKEiHetpDjyrRdjFdKu6Q_cAwFkWC7'
);

let currentUser = null;
let currentProfile = null;

const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const adminBtn = document.getElementById('adminBtn');

const loginEmail = document.getElementById('loginEmail');
const loginPassword = document.getElementById('loginPassword');

const authSection = document.getElementById('authSection');
const appSection = document.getElementById('appSection');

async function login() {

  const { data, error } = await supabase.auth.signInWithPassword({
    email: loginEmail.value,
    password: loginPassword.value
  });

  if (error) {
    alert(error.message);
    return;
  }

  currentUser = data.user;

  const { data: profile } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', currentUser.id)
    .single();

  currentProfile = profile;

  authSection.classList.add('hidden');
  appSection.classList.remove('hidden');

  document.getElementById('userEmail').textContent = currentUser.email;
  document.getElementById('userRole').textContent = profile.role;

  // 🔥 شرط الادمن
  if (profile.role === 'admin') {
    adminBtn.classList.remove('hidden');
  }
}

// 🔥 زر الادمن
adminBtn.addEventListener('click', () => {
  window.location.href = 'https://takamul-agri.github.io/nawarah-report/admin-users.html';
});

logoutBtn.addEventListener('click', async () => {
  await supabase.auth.signOut();
  location.reload();
});

loginBtn.addEventListener('click', login);

</script>
</body>
</html>
