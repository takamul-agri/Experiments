<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - التكامل الوطنية للزراعة نظام تقييم الأصناف</title>
  <style>
    :root {
      --bg: #f3f6fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --border: #dbe3ea;
      --ok-bg: #ecfdf5;
      --ok-text: #065f46;
      --ok-border: #a7f3d0;
      --err-bg: #fef2f2;
      --err-text: #991b1b;
      --err-border: #fecaca;
      --warn-bg: #fff7ed;
      --warn-text: #9a3412;
      --warn-border: #fdba74;
      --shadow: 0 10px 28px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbfd 0%, #edf3f7 100%);
      color: var(--text);
    }

    .container {
      width: min(960px, calc(100% - 24px));
      margin: 24px auto 40px;
    }

    .header {
      background: linear-gradient(135deg, #0f766e, #134e4a);
      color: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3vw, 38px);
    }

    .header p {
      margin: 0;
      color: rgba(255,255,255,0.92);
      line-height: 1.9;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .auth-wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      margin-top: 6px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(15,118,110,0.1);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #eef7f6;
      color: var(--primary-dark);
      border: 1px solid #cfe7e4;
    }

    .btn-danger {
      background: #fff5f5;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.8;
      font-size: 14px;
      border: 1px solid transparent;
      margin-top: 14px;
      white-space: pre-wrap;
    }

    .alert.ok {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: var(--ok-border);
    }

    .alert.err {
      background: var(--err-bg);
      color: var(--err-text);
      border-color: var(--err-border);
    }

    .alert.warn {
      background: var(--warn-bg);
      color: var(--warn-text);
      border-color: var(--warn-border);
    }

    .debug {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px dashed var(--border);
      font-size: 13px;
      color: #334155;
      line-height: 1.8;
      white-space: pre-wrap;
      min-height: 72px;
    }

    .hidden { display: none !important; }

    .dashboard {
      display: grid;
      gap: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      background: #eef7f6;
      color: var(--primary-dark);
      border: 1px solid #cfe7e4;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .info-box {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .info-box span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .info-box strong {
      font-size: 18px;
      word-break: break-word;
    }

    @media (max-width: 700px) {
      .container {
        width: min(100% - 16px, 960px);
      }

      .header,
      .card {
        padding: 14px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>نظام تقييم أصناف بذور التجارب</h1>
      <p>تسجيل دخول مباشر مع فحص واضح لمشكلة Auth وجدول profiles.</p>
    </div>

    <div id="authSection" class="card auth-wrap">
      <div class="title-row">
        <h2>تسجيل الدخول</h2>
      </div>

      <div class="hint">أدخل الإيميل وكلمة المرور المسجلة في Supabase.</div>

      <div class="form-grid">
        <div class="field">
          <label for="loginEmail">الإيميل</label>
          <input id="loginEmail" type="email" autocomplete="email" placeholder="example@company.com" />
        </div>

        <div class="field">
          <label for="loginPassword">كلمة المرور</label>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
      </div>

      <div class="actions">
  <div id="userPill" class="pill">-</div>

  <!-- زر المدير -->
  <a id="adminUsersBtn" href="admin-users.html" class="btn-secondary hidden">
    ➕ إضافة موظف جديد
  </a>

  <button id="reloadBtn" class="btn-secondary" type="button">إعادة تحميل</button>
  <button id="logoutBtn" class="btn-danger" type="button">تسجيل الخروج</button>
</div>

      <div id="authMessage"></div>
      <div id="debugBox" class="debug">جاهز.</div>
    </div>

    <div id="appSection" class="card dashboard hidden">
      <div class="topbar">
        <div>
          <h2>تم تسجيل الدخول بنجاح</h2>
          <div class="hint">هذه الصفحة تظهر إذا نجح Auth ونجح تحميل البروفايل.</div>
        </div>

        <div class="actions">
          <div id="userPill" class="pill">-</div>
          <button id="reloadBtn" class="btn-secondary" type="button">إعادة تحميل</button>
          <button id="logoutBtn" class="btn-danger" type="button">تسجيل الخروج</button>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <span>معرّف المستخدم</span>
          <strong id="userId">-</strong>
        </div>
        <div class="info-box">
          <span>الإيميل</span>
          <strong id="userEmail">-</strong>
        </div>
        <div class="info-box">
          <span>الاسم</span>
          <strong id="userName">-</strong>
        </div>
        <div class="info-box">
          <span>الدور</span>
          <strong id="userRole">-</strong>
        </div>
      </div>

      <div id="appMessage"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://epqgayhsmnqbfdliqhil.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_0TKEiHetpDjyrRdjFdKu6Q_cAwFkWC7';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentProfile = null;

    const authSection = document.getElementById('authSection');
    const appSection = document.getElementById('appSection');
    const adminUsersBtn = document.getElementById('adminUsersBtn');

    const loginEmailInput = document.getElementById('loginEmail');
    const loginPasswordInput = document.getElementById('loginPassword');

    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const testProfileBtn = document.getElementById('testProfileBtn');

    const authMessage = document.getElementById('authMessage');
    const appMessage = document.getElementById('appMessage');
    const debugBox = document.getElementById('debugBox');

    function showBox(target, type, message) {
      target.innerHTML = `<div class="alert ${type}">${message}</div>`;
    }

    function clearBox(target) {
      target.innerHTML = '';
    }

    function logStep(message) {
      const time = new Date().toLocaleTimeString('ar-SA');
      debugBox.textContent += `\n[${time}] ${message}`;
      debugBox.scrollTop = debugBox.scrollHeight;
      console.log(message);
    }

    function resetDebug(message = 'جاهز.') {
      debugBox.textContent = message;
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setLoading(loading) {
      loginBtn.disabled = loading;
      testProfileBtn.disabled = loading;
      loginBtn.textContent = loading ? 'جاري تسجيل الدخول...' : 'دخول';
    }

    async function withTimeout(promise, ms, label) {
      let timer;
      const timeoutPromise = new Promise((_, reject) => {
        timer = setTimeout(() => reject(new Error(`انتهت مهلة ${label} بعد ${ms / 1000} ثوانٍ`)), ms);
      });

      try {
        return await Promise.race([promise, timeoutPromise]);
      } finally {
        clearTimeout(timer);
      }
    }

    async function loadProfileStrict(userId) {
      logStep('بدء قراءة profiles...');
      const result = await withTimeout(
        supabase
          .from('profiles')
          .select('id, email, full_name, role')
          .eq('id', userId)
          .single(),
        10000,
        'قراءة profiles'
      );

      const { data, error } = result;

      if (error) {
        throw new Error(`فشل قراءة profiles: ${error.message}`);
      }

      if (!data) {
        throw new Error('تم تسجيل الدخول في Auth لكن لا يوجد صف مطابق في جدول profiles لهذا المستخدم.');
      }

      currentProfile = data;
      logStep('تم تحميل البروفايل بنجاح.');
      return data;
    }

    function fillDashboard() {
  document.getElementById('userId').textContent = currentUser?.id || '-';
  document.getElementById('userEmail').textContent = currentProfile?.email || currentUser?.email || '-';
  document.getElementById('userName').textContent = currentProfile?.full_name || '-';
  document.getElementById('userRole').textContent = currentProfile?.role || '-';
  document.getElementById('userPill').textContent =
    `${currentProfile?.full_name || currentUser?.email || '-'} • ${currentProfile?.role || '-'}`;

  // 🔥 إظهار زر الإدارة فقط للمدير
  if (currentProfile?.role === 'manager') {
    adminUsersBtn.classList.remove('hidden');
  } else {
    adminUsersBtn.classList.add('hidden');
  }

    function goToApp() {
      authSection.classList.add('hidden');
      appSection.classList.remove('hidden');
      fillDashboard();
    }

    function goToAuth() {
      authSection.classList.remove('hidden');
      appSection.classList.add('hidden');
    }

    async function login() {
      clearBox(authMessage);
      clearBox(appMessage);
      resetDebug('بدء محاولة تسجيل الدخول...');

      const email = loginEmailInput.value.trim();
      const password = loginPasswordInput.value.trim();

      if (!email || !password) {
        showBox(authMessage, 'err', 'أدخل الإيميل وكلمة المرور.');
        return;
      }

      try {
        setLoading(true);

        logStep('تنفيذ signInWithPassword...');
        const { data, error } = await withTimeout(
          supabase.auth.signInWithPassword({ email, password }),
          15000,
          'تسجيل الدخول'
        );

        if (error) {
          throw error;
        }

        if (!data?.user) {
          throw new Error('نجح طلب تسجيل الدخول لكن لم يتم إرجاع user.');
        }

        currentUser = data.user;
        logStep(`تم تسجيل الدخول في Auth بنجاح. user.id = ${currentUser.id}`);

        await loadProfileStrict(currentUser.id);

        showBox(authMessage, 'ok', 'تم تسجيل الدخول وتحميل البروفايل بنجاح.');
        goToApp();
      } catch (err) {
        currentUser = null;
        currentProfile = null;
        goToAuth();

        let msg = err?.message || 'حدث خطأ غير معروف';

        if (msg.includes('Invalid login credentials')) {
          msg = 'بيانات الدخول غير صحيحة.';
        } else if (msg.includes('Email not confirmed')) {
          msg = 'الإيميل غير مؤكد في Supabase.';
        } else if (msg.includes('Failed to fetch')) {
          msg = 'فشل الاتصال بـ Supabase. تحقق من الإنترنت أو من المتصفح أو من حظر الشبكة.';
        }

        logStep(`خطأ: ${msg}`);
        showBox(authMessage, 'err', escapeHtml(msg));
      } finally {
        setLoading(false);
      }
    }

    async function testProfiles() {
      clearBox(authMessage);
      resetDebug('اختبار الوصول إلى جدول profiles...');

      try {
        setLoading(true);

        const { data, error } = await withTimeout(
          supabase.from('profiles').select('id, email, full_name, role').limit(3),
          10000,
          'اختبار profiles'
        );

        if (error) {
          throw new Error(error.message);
        }

        logStep('نجح الوصول إلى جدول profiles.');
        showBox(
          authMessage,
          'ok',
          `تم الوصول إلى profiles بنجاح.\nعدد السجلات التي رجعت في الاختبار: ${Array.isArray(data) ? data.length : 0}`
        );
      } catch (err) {
        let msg = err?.message || 'فشل اختبار profiles';
        logStep(`خطأ الاختبار: ${msg}`);
        showBox(authMessage, 'warn', escapeHtml(`تعذر قراءة profiles: ${msg}`));
      } finally {
        setLoading(false);
      }
    }

    async function reloadSession() {
      clearBox(appMessage);
      resetDebug('إعادة تحميل الجلسة الحالية...');

      try {
        const { data, error } = await supabase.auth.getUser();
        if (error) throw error;

        if (!data.user) {
          throw new Error('لا توجد جلسة حالية.');
        }

        currentUser = data.user;
        logStep(`تم جلب الجلسة. user.id = ${currentUser.id}`);
        await loadProfileStrict(currentUser.id);
        fillDashboard();
        showBox(appMessage, 'ok', 'تم تحديث بيانات الجلسة والبروفايل.');
      } catch (err) {
        showBox(appMessage, 'err', escapeHtml(err.message || 'تعذر إعادة التحميل'));
      }
    }

    async function logout() {
      clearBox(appMessage);
      resetDebug('تسجيل الخروج...');

      try {
        await supabase.auth.signOut();
        currentUser = null;
        currentProfile = null;
        loginPasswordInput.value = '';
        goToAuth();
        logStep('تم تسجيل الخروج.');
      } catch (err) {
        showBox(appMessage, 'err', escapeHtml(err.message || 'تعذر تسجيل الخروج'));
      }
    }

    async function boot() {
      resetDebug('فحص الجلسة الحالية...');
      try {
        const { data, error } = await supabase.auth.getUser();
        if (error) throw error;

        if (!data.user) {
          logStep('لا توجد جلسة محفوظة.');
          goToAuth();
          return;
        }

        currentUser = data.user;
        logStep(`وجدت جلسة محفوظة. user.id = ${currentUser.id}`);

        await loadProfileStrict(currentUser.id);
        goToApp();
        showBox(appMessage, 'ok', 'تم الدخول تلقائيًا من الجلسة المحفوظة.');
      } catch (err) {
        logStep(`فشل boot: ${err.message || err}`);
        goToAuth();
      }
    }

    loginBtn.addEventListener('click', login);
    logoutBtn.addEventListener('click', logout);
    reloadBtn.addEventListener('click', reloadSession);
    testProfileBtn.addEventListener('click', testProfiles);

    loginPasswordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });

    boot();
  </script>
</body>
</html>
