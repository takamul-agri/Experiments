<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نسيت كلمة المرور</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #018f45;
      --primary-dark: #01753a;
      --border: #dbe3ea;
      --ok-bg: #ecfdf5;
      --ok-text: #065f46;
      --ok-border: #a7f3d0;
      --err-bg: #fef2f2;
      --err-text: #991b1b;
      --err-border: #fecaca;
      --shadow: 0 10px 28px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: min(960px, calc(100% - 24px));
      margin: 24px auto 40px;
    }

    .header {
      background: linear-gradient(135deg, #018f45, #01753a);
      color: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3vw, 38px);
    }

    .header p {
      margin: 0;
      color: rgba(255,255,255,0.92);
      line-height: 1.9;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      max-width: 560px;
      margin: 0 auto;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(1,143,69,0.10);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button,
    a {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #eef8f2;
      color: var(--primary-dark);
      border: 1px solid #cfe7d6;
    }

    .btn-secondary:hover {
      background: #e4f3e8;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.8;
      font-size: 14px;
      border: 1px solid transparent;
      margin-top: 14px;
      white-space: pre-wrap;
    }

    .alert.ok {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: var(--ok-border);
    }

    .alert.err {
      background: var(--err-bg);
      color: var(--err-text);
      border-color: var(--err-border);
    }

    .footer-logos {
      width: 100%;
      text-align: center;
      margin-top: 36px;
      padding: 8px 0 0;
    }

    .footer-logos img {
      max-width: min(92%, 720px);
      width: 100%;
      height: auto;
      display: inline-block;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>نسيت كلمة المرور</h1>
      <p>أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور.</p>
    </div>

    <div class="card">
      <div class="field">
        <label for="email">الإيميل</label>
        <input id="email" type="email" placeholder="example@company.com" autocomplete="email" />
      </div>

      <div class="actions">
        <button id="sendBtn" class="btn-primary" type="button">إرسال الرابط</button>
        <a class="btn-secondary" href="index.html">الرجوع لتسجيل الدخول</a>
      </div>

      <div id="message"></div>
    </div>

    <div class="footer-logos">
      <img src="https://pub-cd0f58e55c564e2eb5b6faa013d69fd6.r2.dev/sigen.jpg" alt="الشعارات" />
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://epqgayhsmnqbfdliqhil.supabase.co';
    const SUPABASE_ANON_KEY = 'ضع_المفتاح_هنا';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailInput = document.getElementById('email');
    const sendBtn = document.getElementById('sendBtn');
    const message = document.getElementById('message');

    function showBox(type, text) {
      message.innerHTML = `<div class="alert ${type}">${text}</div>`;
    }

    sendBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();

      if (!email) {
        showBox('err', 'أدخل الإيميل أولاً.');
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = 'جارٍ الإرسال...';

      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: 'https://takamul-agri.github.io/nawarah-report/reset-password.html'
        });

        if (error) throw error;

        showBox('ok', 'إذا كان هذا الإيميل مسجلاً، فسيصلك رابط إعادة التعيين على البريد الإلكتروني.');
      } catch (err) {
        showBox('err', err.message || 'تعذر إرسال الرابط.');
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'إرسال الرابط';
      }
    });
  </script>
</body>
</html>
