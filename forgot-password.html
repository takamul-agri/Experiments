<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تعيين كلمة مرور جديدة</title>
  <style>
    :root {
      --bg: #f3f6fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --border: #dbe3ea;
      --ok-bg: #ecfdf5;
      --ok-text: #065f46;
      --ok-border: #a7f3d0;
      --err-bg: #fef2f2;
      --err-text: #991b1b;
      --err-border: #fecaca;
      --shadow: 0 10px 28px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbfd 0%, #edf3f7 100%);
      color: var(--text);
    }

    .container {
      width: min(960px, calc(100% - 24px));
      margin: 24px auto 40px;
    }

    .header {
      background: linear-gradient(135deg, #0f766e, #134e4a);
      color: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3vw, 38px);
    }

    .header p {
      margin: 0;
      color: rgba(255,255,255,0.92);
      line-height: 1.9;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      max-width: 560px;
      margin: 0 auto;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(15,118,110,0.1);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button,
    a {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #eef7f6;
      color: var(--primary-dark);
      border: 1px solid #cfe7e4;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.8;
      font-size: 14px;
      border: 1px solid transparent;
      margin-top: 14px;
      white-space: pre-wrap;
    }

    .alert.ok {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: var(--ok-border);
    }

    .alert.err {
      background: var(--err-bg);
      color: var(--err-text);
      border-color: var(--err-border);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>تعيين كلمة مرور جديدة</h1>
      <p>أدخل كلمة المرور الجديدة ثم احفظ التغيير.</p>
    </div>

    <div class="card">
      <div id="resetForm" class="hidden">
        <div class="field">
          <label for="newPassword">كلمة المرور الجديدة</label>
          <input id="newPassword" type="password" placeholder="••••••••" />
        </div>

        <div class="field">
          <label for="confirmPassword">تأكيد كلمة المرور</label>
          <input id="confirmPassword" type="password" placeholder="••••••••" />
        </div>

        <div class="actions">
          <button id="saveBtn" class="btn-primary" type="button">حفظ كلمة المرور</button>
          <a class="btn-secondary" href="index.html">الرجوع لتسجيل الدخول</a>
        </div>
      </div>

      <div id="message"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://epqgayhsmnqbfdliqhil.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_0TKEiHetpDjyrRdjFdKu6Q_cAwFkWC7';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: false,
        autoRefreshToken: false,
        detectSessionInUrl: true
      }
    });

    const resetForm = document.getElementById('resetForm');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const saveBtn = document.getElementById('saveBtn');
    const message = document.getElementById('message');

    function showBox(type, text) {
      message.innerHTML = `<div class="alert ${type}">${text}</div>`;
    }

    async function checkRecoverySession() {
      try {
        const hash = window.location.hash || '';
        const search = window.location.search || '';

        const looksLikeRecoveryLink =
          hash.includes('type=recovery') ||
          search.includes('type=recovery') ||
          hash.includes('access_token=') ||
          search.includes('access_token=');

        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;

        if (!looksLikeRecoveryLink || !data.session) {
          resetForm.classList.add('hidden');
          showBox('err', 'هذا الرابط غير صالح أو منتهي. اطلب إعادة تعيين كلمة المرور من جديد.');
          return;
        }

        resetForm.classList.remove('hidden');
      } catch (err) {
        resetForm.classList.add('hidden');
        showBox('err', 'تعذر التحقق من رابط الاستعادة. اطلب رابطًا جديدًا.');
      }
    }

    saveBtn.addEventListener('click', async () => {
      const newPassword = newPasswordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (!newPassword || !confirmPassword) {
        showBox('err', 'أدخل كلمة المرور الجديدة وتأكيدها.');
        return;
      }

      if (newPassword.length < 6) {
        showBox('err', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل.');
        return;
      }

      if (newPassword !== confirmPassword) {
        showBox('err', 'كلمتا المرور غير متطابقتين.');
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'جارٍ الحفظ...';

      try {
        const { error } = await supabase.auth.updateUser({
          password: newPassword
        });

        if (error) throw error;

        showBox('ok', 'تم تغيير كلمة المرور بنجاح. سيتم تحويلك إلى صفحة تسجيل الدخول...');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2500);
      } catch (err) {
        showBox('err', err.message || 'تعذر تحديث كلمة المرور.');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'حفظ كلمة المرور';
      }
    });

    checkRecoverySession();
  </script>
</body>
</html>
