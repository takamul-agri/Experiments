<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة المستخدمين</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial;
      background: #f4f7fb;
    }

    .container {
      width: 90%;
      margin: auto;
      margin-top: 20px;
    }

    .hero {
      background: linear-gradient(135deg, #0f766e, #134e4a);
      color: white;
      padding: 25px;
      border-radius: 20px;
    }

    .hero h1 {
      margin: 0;
    }

    .hero p {
      margin: 10px 0;
    }

    .btn-home {
      margin-top: 15px;
      background: #fff;
      color: #0f766e;
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-top: 15px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    #createBtn {
      background: #0f766e;
      color: white;
    }

    #refreshBtn {
      background: #ddd;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>إدارة المدراء والموظفين</h1>
    <p>صفحة داخلية لإضافة المستخدمين الجدد وتعديل صلاحياتهم.</p>

    <button onclick="goHome()" class="btn-home">🏠 الرجوع للصفحة الرئيسية</button>
  </div>

  <div class="card">
    <h2>إضافة مستخدم</h2>

    <input id="name" type="text" placeholder="ادخل اسم الموظف" />
    <input id="email" type="email" placeholder="example@company.com" autocomplete="off" />
    <input id="password" type="password" placeholder="كلمة المرور" />

    <select id="role">
      <option value="employee">موظف</option>
      <option value="manager">مدير</option>
    </select>

    <button id="createBtn">إضافة المستخدم</button>
    <button id="refreshBtn">تحديث</button>

    <div id="msg"></div>
  </div>

  <div class="card">
    <h2>قائمة المستخدمين</h2>
    <div id="usersBox"></div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://epqgayhsmnqbfdliqhil.supabase.co',
  'sb_publishable_0TKEiHetpDjyrRdjFdKu6Q_cAwFkWC7'
);

const msg = document.getElementById('msg');
const usersBox = document.getElementById('usersBox');
const createBtn = document.getElementById('createBtn');
const refreshBtn = document.getElementById('refreshBtn');

function show(text, type = 'ok') {
  msg.innerHTML = `<p style="color:${type === 'ok' ? 'green' : 'red'}">${text}</p>`;
}

function resetForm() {
  document.getElementById('name').value = '';
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
  document.getElementById('role').value = 'employee';
  document.getElementById('name').focus();
}

function goHome() {
  window.location.href = "index.html";
}

async function createUser() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const role = document.getElementById('role').value;

  if (!name || !email || !password) {
    show('أكمل البيانات', 'err');
    return;
  }

  try {
    createBtn.disabled = true;

    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) throw error;

    const userId = data.user.id;

    const { error: profileError } = await supabase
      .from('profiles')
      .insert({
        id: userId,
        full_name: name,
        email,
        role
      });

    if (profileError) throw profileError;

    show('تمت الإضافة بنجاح');

    resetForm();
    loadUsers();

  } catch (err) {
    show(err.message, 'err');
  } finally {
    createBtn.disabled = false;
  }
}

async function loadUsers() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*');

  if (error) {
    usersBox.innerHTML = 'خطأ في تحميل البيانات';
    return;
  }

  usersBox.innerHTML = data.map(u => `
    <div style="margin-bottom:10px">
      ${u.full_name} - ${u.email} (${u.role})
    </div>
  `).join('');
}

createBtn.addEventListener('click', createUser);
refreshBtn.addEventListener('click', loadUsers);

resetForm();
loadUsers();

</script>

</body>
</html>
